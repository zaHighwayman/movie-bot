name: Debug Finnkino API

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Try multiple Finnkino endpoints
        run: |
          for URL in \
            "https://www.finnkino.fi/xml/Events/?noBotProtection=1" \
            "https://finnkino.fi/xml/Events/" \
            "https://www.finnkino.fi/fi/xml/Events/" \
            "https://www.finnkino.fi/xml/Schedule/" \
            "https://www.finnkino.fi/rss/events/" \
            "https://www.finnkino.fi/sitemap.xml"
          do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "User-Agent: Mozilla/5.0" \
              -L "$URL")
            echo "[$STATUS] $URL"
          done
